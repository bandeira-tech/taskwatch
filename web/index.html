<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>taskwatch</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>taskwatch</h1>
        <span class="sub" id="counts">…</span>
      </div>
      <nav class="tabs" role="tablist" aria-label="status">
        <button class="tab" data-status="" type="button">all</button>
        <button class="tab s-active"     data-status="active"     type="button">active</button>
        <button class="tab s-paused"     data-status="paused"     type="button">paused</button>
        <button class="tab s-blocked"    data-status="blocked"    type="button">blocked</button>
        <button class="tab s-rotting"    data-status="rotting"    type="button">rotting</button>
        <button class="tab s-done"       data-status="done"       type="button">done</button>
        <button class="tab s-abandoned"  data-status="abandoned"  type="button">abandoned</button>
        <button class="tab s-superseded" data-status="superseded" type="button">superseded</button>
      </nav>
      <div class="actions">
        <button id="btn-refresh" class="btn" type="button">refresh</button>
        <button id="btn-new" class="btn primary" type="button">+ new</button>
      </div>
    </header>

    <div class="layout">
      <aside class="filters-col" aria-label="filters">
        <div class="filter-group">
          <div class="filter-label">tags</div>
          <ul id="tags-list" class="filter-list"></ul>
        </div>
        <button id="clear-filters" class="clear-btn hidden" type="button">clear filters</button>
      </aside>

      <aside class="list-col" aria-label="tasks">
        <ul id="list" class="list" role="listbox"></ul>
      </aside>

      <section id="content" class="content" aria-label="task detail">
        <div class="placeholder">
          <p>Select a task from the list to open it here.</p>
        </div>
      </section>
    </div>

    <footer>
      <code id="basepath-label">…</code>
      <span id="version-label"></span>
    </footer>
  </div>

  <!-- new task modal -->
  <div id="new-modal" class="modal-backdrop hidden">
    <div class="modal">
      <h2>new task</h2>
      <form id="new-form">
        <div>
          <label>title</label>
          <input name="title" required autocomplete="off" />
        </div>
        <div>
          <label>description <small>(markdown)</small></label>
          <textarea name="description" rows="5"></textarea>
        </div>
        <div class="grid-2">
          <div>
            <label>tags <small>(comma-sep)</small></label>
            <input name="tags" autocomplete="off" />
          </div>
          <div>
            <label>agent</label>
            <input name="agent" autocomplete="off" placeholder="claude" />
          </div>
        </div>
        <div class="grid-3">
          <div>
            <label>repo</label>
            <input name="repo" autocomplete="off" />
          </div>
          <div>
            <label>branch</label>
            <input name="branch" autocomplete="off" />
          </div>
          <div>
            <label>pr</label>
            <input name="pr" autocomplete="off" />
          </div>
        </div>
        <div>
          <label>worktree</label>
          <input name="worktree" autocomplete="off" />
        </div>
        <div class="footer">
          <button type="button" id="new-cancel" class="btn">cancel</button>
          <button type="submit" class="btn primary">create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- entry modal -->
  <div id="entry-modal" class="modal-backdrop hidden">
    <div class="modal">
      <h2>append entry</h2>
      <form id="entry-form">
        <div class="grid-2">
          <div>
            <label>kind</label>
            <select name="kind">
              <option>note</option>
              <option>progress</option>
              <option>handoff</option>
              <option>rot</option>
              <option>supersede</option>
            </select>
          </div>
          <div>
            <label>new status</label>
            <select name="new_status">
              <option value="">(unchanged)</option>
              <option>active</option>
              <option>paused</option>
              <option>blocked</option>
              <option>rotting</option>
              <option>done</option>
              <option>abandoned</option>
              <option>superseded</option>
            </select>
          </div>
        </div>
        <div>
          <label>body <small>(markdown)</small></label>
          <textarea name="body" rows="5"></textarea>
        </div>
        <div class="footer">
          <button type="button" id="entry-cancel" class="btn">cancel</button>
          <button type="submit" class="btn primary">append</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
