<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>taskwatch</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .pill {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
    }
    .pill-active     { background: #dcfce7; color: #166534; }
    .pill-paused     { background: #fef3c7; color: #854d0e; }
    .pill-blocked    { background: #fee2e2; color: #991b1b; }
    .pill-done       { background: #e0e7ff; color: #3730a3; }
    .pill-abandoned  { background: #f3f4f6; color: #4b5563; }
    .pill-rotting    { background: #fed7aa; color: #9a3412; }
    .pill-superseded { background: #f5f3ff; color: #6b21a8; }
  </style>
</head>
<body class="bg-stone-50 text-stone-900">
  <header class="bg-white border-b border-stone-200">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <h1 class="text-lg font-semibold">taskwatch</h1>
      <div class="flex items-center gap-2 text-sm">
        <select id="filter-status" class="border border-stone-300 rounded px-2 py-1 text-sm bg-white">
          <option value="">all statuses</option>
          <option value="active" selected>active</option>
          <option value="paused">paused</option>
          <option value="blocked">blocked</option>
          <option value="rotting">rotting</option>
          <option value="done">done</option>
          <option value="abandoned">abandoned</option>
          <option value="superseded">superseded</option>
        </select>
        <button id="btn-refresh" class="px-3 py-1 rounded border border-stone-300 bg-white hover:bg-stone-100">refresh</button>
        <button id="btn-new" class="px-3 py-1 rounded bg-stone-900 text-white hover:bg-stone-700">+ new</button>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-6">
    <div id="error" class="hidden mb-4 px-4 py-3 rounded bg-rose-50 border border-rose-200 text-rose-800 text-sm"></div>
    <div id="list" class="space-y-3"></div>
    <div id="detail" class="hidden mt-6"></div>
  </main>

  <!-- new task modal -->
  <div id="new-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center px-4">
    <div class="bg-white rounded-lg shadow-xl max-w-lg w-full p-6">
      <h2 class="text-lg font-semibold mb-4">new task</h2>
      <form id="new-form" class="space-y-3">
        <div>
          <label class="text-sm font-medium block mb-1">title</label>
          <input name="title" required class="w-full border border-stone-300 rounded px-3 py-2" />
        </div>
        <div>
          <label class="text-sm font-medium block mb-1">description</label>
          <textarea name="description" rows="4" class="w-full border border-stone-300 rounded px-3 py-2"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-sm font-medium block mb-1">tags <span class="text-stone-400">(comma-sep)</span></label>
            <input name="tags" class="w-full border border-stone-300 rounded px-3 py-2" />
          </div>
          <div>
            <label class="text-sm font-medium block mb-1">agent</label>
            <input name="agent" class="w-full border border-stone-300 rounded px-3 py-2" placeholder="claude" />
          </div>
        </div>
        <div class="grid grid-cols-3 gap-3">
          <div>
            <label class="text-sm font-medium block mb-1">repo</label>
            <input name="repo" class="w-full border border-stone-300 rounded px-3 py-2" />
          </div>
          <div>
            <label class="text-sm font-medium block mb-1">branch</label>
            <input name="branch" class="w-full border border-stone-300 rounded px-3 py-2" />
          </div>
          <div>
            <label class="text-sm font-medium block mb-1">pr</label>
            <input name="pr" class="w-full border border-stone-300 rounded px-3 py-2" />
          </div>
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button type="button" id="new-cancel" class="px-3 py-2 rounded border border-stone-300">cancel</button>
          <button type="submit" class="px-3 py-2 rounded bg-stone-900 text-white">create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- update modal -->
  <div id="update-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center px-4">
    <div class="bg-white rounded-lg shadow-xl max-w-lg w-full p-6">
      <h2 class="text-lg font-semibold mb-4">append update</h2>
      <form id="update-form" class="space-y-3">
        <input type="hidden" name="taskId" />
        <div>
          <label class="text-sm font-medium block mb-1">message</label>
          <input name="message" required class="w-full border border-stone-300 rounded px-3 py-2" />
        </div>
        <div>
          <label class="text-sm font-medium block mb-1">body <span class="text-stone-400">(optional, longer notes)</span></label>
          <textarea name="body" rows="3" class="w-full border border-stone-300 rounded px-3 py-2"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-sm font-medium block mb-1">kind</label>
            <select name="kind" class="w-full border border-stone-300 rounded px-3 py-2 bg-white">
              <option>note</option>
              <option>progress</option>
              <option>status</option>
              <option>resource</option>
              <option>rot</option>
              <option>supersede</option>
              <option>handoff</option>
            </select>
          </div>
          <div>
            <label class="text-sm font-medium block mb-1">new status</label>
            <select name="new_status" class="w-full border border-stone-300 rounded px-3 py-2 bg-white">
              <option value="">(unchanged)</option>
              <option>active</option>
              <option>paused</option>
              <option>blocked</option>
              <option>done</option>
              <option>abandoned</option>
              <option>rotting</option>
              <option>superseded</option>
            </select>
          </div>
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button type="button" id="update-cancel" class="px-3 py-2 rounded border border-stone-300">cancel</button>
          <button type="submit" class="px-3 py-2 rounded bg-stone-900 text-white">append</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
